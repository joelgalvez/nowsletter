# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production: &production_jobs
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  cleanup_old_cached_images:
    class: CleanupOldCachedImagesJob
    schedule: at 3am every day

development:

staging:

<% custom_env = ENV.fetch("RAILS_ENV", nil)
   known_envs = %w[development test production staging]
   if custom_env && !known_envs.include?(custom_env) %>
<%= custom_env %>:
  <<: *production_jobs
<% end %>
