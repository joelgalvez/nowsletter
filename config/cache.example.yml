default: &default
  store_options:
    # Cap age of oldest cache entry to fulfill retention policies
    # max_age: <%= 60.days.to_i %>
    max_size: <%= 256.megabytes %>
    namespace: <%= Rails.env %>

development:
  <<: *default

test:
  <<: *default

production: &production
  database: cache
  <<: *default

staging:
  <<: *production

<% custom_env = ENV.fetch("RAILS_ENV", nil)
   known_envs = %w[development test production staging]
   if custom_env && !known_envs.include?(custom_env) %>
<%= custom_env %>:
  <<: *production
<% end %>
